<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        const storedSettings = JSON.parse(localStorage.getItem("tagium:app-settings") || "null");
        const hasMode =
          storedSettings !== null && typeof storedSettings === "object" && "mode" in storedSettings;
        const mode = ["light", "dark"].includes(storedSettings?.mode)
          ? storedSettings.mode
          : !hasMode && storedSettings?.theme === "signal"
            ? "dark"
            : "light";
        const accentA = /^#[\da-f]{6}$/i.test(storedSettings?.accentA)
          ? storedSettings.accentA
          : "#114cbf";
        const accentB = /^#[\da-f]{6}$/i.test(storedSettings?.accentB)
          ? storedSettings.accentB
          : "#e93f2d";
        document.documentElement.dataset.theme = mode;
        document.documentElement.classList.toggle("dark", mode === "dark");
        document.documentElement.style.setProperty("--accent-a", accentA);
        document.documentElement.style.setProperty("--accent-b", accentB);
      } catch {
        document.documentElement.dataset.theme = "light";
        document.documentElement.classList.remove("dark");
        document.documentElement.style.setProperty("--accent-a", "#114cbf");
        document.documentElement.style.setProperty("--accent-b", "#e93f2d");
      }
    </script>
    <title>tagium</title>
    <meta
      name="description"
      content="tagium is the best way to save your favorite music and edit mp3 tags all on the web."
    />
    <meta property="og:title" content="tagium" />
    <meta
      property="og:description"
      content="save your favorite music and edit mp3 tags all on the web."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tagium.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="tagium" />
    <meta
      name="twitter:description"
      content="save your favorite music and edit mp3 tags all on the web."
    />
    <link rel="canonical" href="https://tagium.app/" />
    <link rel="icon" href="/favicon.ico" />
    <script>
      (() => {
        const faviconByDeployEnv = {
          local: "/favicon-dev.png",
          preview: "/favicon-preview.png",
          production: "/favicon.ico",
        };
        const favicon = document.querySelector('link[rel="icon"]');
        const setDeployEnvFavicon = (deployEnv) => {
          if (favicon && Object.hasOwn(faviconByDeployEnv, deployEnv)) {
            favicon.href = faviconByDeployEnv[deployEnv];
          }
        };
        const normalizedHostname = window.location.hostname.toLowerCase();
        const isLocalDev =
          normalizedHostname === "localhost" ||
          normalizedHostname === "127.0.0.1" ||
          normalizedHostname === "0.0.0.0" ||
          normalizedHostname === "::1" ||
          normalizedHostname.endsWith(".local");

        if (isLocalDev) {
          setDeployEnvFavicon("local");
        }

        fetch("/api/dev/config", { headers: { Accept: "application/json" } })
          .then((response) => (response.ok ? response.json() : null))
          .then((config) => {
            if (config?.deployEnv) {
              setDeployEnvFavicon(config.deployEnv);
            }
          })
          .catch(() => {});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
