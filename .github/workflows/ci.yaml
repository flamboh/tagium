name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp build
      - run: vp exec playwright install --with-deps
      - run: vp exec playwright test

      - name: Upload browser test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
