name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install && vp run dev:setup
      - run: vp check
      - run: vp test
      - run: vp build
