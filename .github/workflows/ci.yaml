name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Vite+
        shell: bash
        run: curl -fsSL https://vite.plus | bash

      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install Dependencies
        run: vp install

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp build
