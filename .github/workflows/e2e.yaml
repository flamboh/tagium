name: E2E and deploy after merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: tagium-production
  cancel-in-progress: true

jobs:
  browser:
    name: Cross-browser E2E
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Confirm merge is still the latest main commit
        run: |
          git fetch origin main
          test "$(git rev-parse origin/main)" = "${{ github.event.pull_request.merge_commit_sha }}"

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp build
      - run: vp exec playwright install --with-deps
      - run: vp exec playwright test

      - name: Upload browser test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy production
    needs: browser
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Confirm merge is still the latest main commit
        run: |
          git fetch origin main
          test "$(git rev-parse origin/main)" = "${{ github.event.pull_request.merge_commit_sha }}"

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp build

      - name: Deploy Worker
        run: bun run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
