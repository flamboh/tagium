name: Deploy pull request preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: tagium-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: vp install
      - name: Build preview Worker
        run: vp build
        env:
          VITE_PUBLIC_DEPLOY_ENV: preview
          VITE_PUBLIC_RELEASE_SHA: ${{ github.sha }}
          VITE_PUBLIC_SHARE_LINKS_ENABLED: ${{ vars.VITE_PUBLIC_SHARE_LINKS_ENABLED }}

      - name: Deploy preview Worker
        run: "bun run deploy:preview -- --message 'PR #${{ github.event.pull_request.number }} ${{ github.sha }}'"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SHARE_PREVIEW_D1_DATABASE_ID: ${{ vars.SHARE_PREVIEW_D1_DATABASE_ID }}
          SHARE_PREVIEW_D1_DATABASE_NAME: ${{ vars.SHARE_PREVIEW_D1_DATABASE_NAME }}
          SHARE_PREVIEW_R2_BUCKET_NAME: ${{ vars.SHARE_PREVIEW_R2_BUCKET_NAME }}
          SHARE_PREVIEW_CREATE_RATE_LIMIT_NAMESPACE_ID: ${{ vars.SHARE_PREVIEW_CREATE_RATE_LIMIT_NAMESPACE_ID }}
          SHARE_PREVIEW_READ_RATE_LIMIT_NAMESPACE_ID: ${{ vars.SHARE_PREVIEW_READ_RATE_LIMIT_NAMESPACE_ID }}
          SHARE_PREVIEW_REVOKE_RATE_LIMIT_NAMESPACE_ID: ${{ vars.SHARE_PREVIEW_REVOKE_RATE_LIMIT_NAMESPACE_ID }}
