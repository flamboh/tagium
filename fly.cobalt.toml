app = "tagium-cobalt"
primary_region = "lax"
kill_signal = "SIGTERM"
kill_timeout = 300

[build]
dockerfile = "Dockerfile.cobalt"

[processes]
app = "node /app/cobalt-machine-proxy.mjs"

[env]
API_URL = "https://tagium-cobalt.fly.dev/"
CUSTOM_INNERTUBE_CLIENT = "WEB_EMBEDDED"
YOUTUBE_GENERATE_PO_TOKENS = "0"
RATELIMIT_WINDOW = "60"
RATELIMIT_MAX = "1000"
TUNNEL_RATELIMIT_WINDOW = "60"
TUNNEL_RATELIMIT_MAX = "2000"
PROXY_MAX_QUEUED_RESOLVE = "96"
PROXY_MAX_QUEUED_TUNNEL = "192"
PROXY_MAX_QUEUE_WAIT_MS = "30000"
PROXY_DRAIN_TIMEOUT_MS = "270000"

[http_service]
internal_port = 9000
force_https = true
# Wrapper emits X-Cobalt-Machine-Id so tunnel requests can target the same Machine.
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[http_service.checks]]
grace_period = "30s"
interval = "15s"
method = "GET"
path = "/readyz"
timeout = "2s"

[http_service.checks.headers]
X-Forwarded-Proto = "https"

[[vm]]
memory = "1024mb"
cpu_kind = "shared"
cpus = 1
